name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    name: Python tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,acp,messaging]" || pip install -e ".[dev,acp]" || pip install -e ".[dev]" || pip install -e .

      - name: Ruff lint (load-bearing rule)
        run: ruff check . || true

      - name: Run tests (non-integration)
        run: >
          pytest -m 'not integration' -q
          --ignore=tests/agent/test_credits_fixture_snapshot.py
          --ignore=tests/cyberfox_cli/test_billing_scope_stepup.py
          --ignore=tests/cyberfox_cli/test_quarantine_forensic_logging.py
          --ignore=tests/cyberfox_cli/test_service_manager.py

  web:
    name: Web lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
